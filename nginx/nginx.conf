
log_format agent_compose '$remote_addr - [$time_local] $status "$request" "$http_user_agent"';

upstream agent_compose_backend {
    server agent-compose:7410;
    keepalive 256;
}

server {
    listen 8000 default_server;
    server_name localhost _;

    access_log  /var/log/nginx/agent-compose.access.log;
    error_log  /var/log/nginx/agent-compose.error.log;

    error_page 404 /404.html;

    charset utf-8;
    root /srv/agent-compose/frontend;

    client_header_timeout 10s;
    client_body_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    client_max_body_size 1024m;

    location ^~ /agent-compose/session/ {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;

        access_log /var/log/nginx/agent-compose.jupyter.log agent_compose;
    }

    location ^~ ${NGINX_JUPYTER_PROXY_BASE}/ {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;

        access_log /var/log/nginx/agent-compose.jupyter.log agent_compose;
    }

    location ~ ^/jupyter/ {
        rewrite ^/jupyter/(.*)$ ${NGINX_JUPYTER_PROXY_BASE}/$1 break;
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;

        access_log /var/log/nginx/agent-compose.jupyter.log agent_compose;
    }

    location ^~ /agentcompose.v1. {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        access_log /var/log/nginx/agent-compose.api.log agent_compose;
    }

    location ^~ /agentcompose.v2. {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        access_log /var/log/nginx/agent-compose.api.log agent_compose;
    }

    location ^~ /health.v1. {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        access_log /var/log/nginx/agent-compose.api.log agent_compose;
    }

    location ^~ /api/ {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        access_log /var/log/nginx/agent-compose.api.log agent_compose;
    }

    location ^~ /oauth/ {
        proxy_pass http://agent_compose_backend;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        access_log /var/log/nginx/agent-compose.api.log agent_compose;
    }

    location = / {
        try_files $uri /index.html;
    }

    location = /404.html {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
