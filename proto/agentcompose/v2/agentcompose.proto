syntax = "proto3";

package agentcompose.v2;

import "google/protobuf/timestamp.proto";

option go_package = "agent-compose/proto/agentcompose/v2;agentcomposev2";

service ProjectService {
  rpc ValidateProject(ValidateProjectRequest) returns (ValidateProjectResponse);
  rpc ApplyProject(ApplyProjectRequest) returns (ApplyProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc RemoveProject(RemoveProjectRequest) returns (RemoveProjectResponse);
  rpc WatchProject(WatchProjectRequest) returns (stream WatchProjectResponse);
  rpc GetScheduler(GetSchedulerRequest) returns (GetSchedulerResponse);
  rpc ListSchedulers(ListSchedulersRequest) returns (ListSchedulersResponse);
  rpc ListSchedulerEvents(ListSchedulerEventsRequest) returns (ListSchedulerEventsResponse);
  rpc SetSchedulerEnabled(SetSchedulerEnabledRequest) returns (SetSchedulerEnabledResponse);
  rpc SetSchedulerTriggerEnabled(SetSchedulerTriggerEnabledRequest) returns (SetSchedulerTriggerEnabledResponse);
}

service RunService {
  rpc RunAgent(RunAgentRequest) returns (RunAgentResponse);
  rpc StartRun(StartRunRequest) returns (StartRunResponse);
  // Stable server-stream projection of RunAgent for non-interactive stream views.
  // Interactive clients that need stdin, resize, signal, or multi-turn prompt
  // attachment should use RunAttach.
  rpc RunAgentStream(RunAgentRequest) returns (stream RunAgentStreamResponse);
  rpc RunAttach(stream RunAttachRequest) returns (stream RunAttachResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc FollowRunLogs(FollowRunLogsRequest) returns (stream RunLogChunk);
  rpc StopRun(StopRunRequest) returns (StopRunResponse);
  rpc ListRunEvents(ListRunEventsRequest) returns (ListRunEventsResponse);
  rpc ListSandboxRunEvents(ListSandboxRunEventsRequest) returns (ListSandboxRunEventsResponse);
}

service ExecService {
  rpc Exec(ExecRequest) returns (ExecResponse);
  // Stable server-stream projection of Exec for non-interactive stream views.
  // Interactive clients that need stdin, resize, or signal attachment should use
  // ExecAttach.
  rpc ExecStream(ExecRequest) returns (stream ExecStreamResponse);
  rpc ExecAttach(stream ExecAttachRequest) returns (stream ExecAttachResponse);
}

service ImageService {
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  rpc PullImage(PullImageRequest) returns (PullImageResponse);
  rpc InspectImage(InspectImageRequest) returns (InspectImageResponse);
  rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse);
  rpc BuildImage(BuildImageRequest) returns (stream BuildImageEvent);
}

service CacheService {
  rpc ListCaches(ListCachesRequest) returns (ListCachesResponse);
  rpc InspectCache(InspectCacheRequest) returns (InspectCacheResponse);
  rpc PruneCaches(PruneCachesRequest) returns (PruneCachesResponse);
  rpc RemoveCache(RemoveCacheRequest) returns (RemoveCacheResponse);
}

service VolumeService {
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
  rpc InspectVolume(InspectVolumeRequest) returns (InspectVolumeResponse);
  rpc RemoveVolume(RemoveVolumeRequest) returns (RemoveVolumeResponse);
  rpc PruneVolumes(PruneVolumesRequest) returns (PruneVolumesResponse);
}

service SandboxService {
  rpc RemoveSandbox(RemoveSandboxRequest) returns (RemoveSandboxResponse);
  rpc PruneSandboxes(PruneSandboxesRequest) returns (PruneSandboxesResponse);
  rpc GetSandboxStats(GetSandboxStatsRequest) returns (GetSandboxStatsResponse);
  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc StopSandbox(StopSandboxRequest) returns (StopSandboxResponse);
  rpc ResumeSandbox(ResumeSandboxRequest) returns (ResumeSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc ListSandboxHistory(ListSandboxHistoryRequest) returns (ListSandboxHistoryResponse);
  rpc WatchSandbox(WatchSandboxRequest) returns (stream WatchSandboxResponse);
}

service DashboardService {
  rpc GetDashboardOverview(GetDashboardOverviewRequest) returns (GetDashboardOverviewResponse);
  rpc WatchDashboardOverview(WatchDashboardOverviewRequest) returns (stream WatchDashboardOverviewResponse);
}

service SettingsService {
  rpc GetGlobalEnv(GetGlobalEnvRequest) returns (GetGlobalEnvResponse);
  rpc UpdateGlobalEnv(UpdateGlobalEnvRequest) returns (UpdateGlobalEnvResponse);
  rpc GetCapabilityGatewayConfig(GetCapabilityGatewayConfigRequest) returns (GetCapabilityGatewayConfigResponse);
  rpc UpdateCapabilityGatewayConfig(UpdateCapabilityGatewayConfigRequest) returns (UpdateCapabilityGatewayConfigResponse);
  rpc ListWorkspacePresets(ListWorkspacePresetsRequest) returns (ListWorkspacePresetsResponse);
  rpc CreateWorkspacePreset(CreateWorkspacePresetRequest) returns (WorkspacePresetResponse);
  rpc UpdateWorkspacePreset(UpdateWorkspacePresetRequest) returns (WorkspacePresetResponse);
  rpc DeleteWorkspacePreset(DeleteWorkspacePresetRequest) returns (DeleteWorkspacePresetResponse);
}

service CapabilityService {
  rpc GetCapabilityStatus(GetCapabilityStatusRequest) returns (CapabilityStatusResponse);
  rpc ListCapabilitySets(ListCapabilitySetsRequest) returns (ListCapabilitySetsResponse);
  rpc GetCapabilityCatalog(GetCapabilityCatalogRequest) returns (GetCapabilityCatalogResponse);
}

service LLMService {
  rpc Generate(GenerateLLMRequest) returns (GenerateLLMResponse);
}

service ResourceService {
  rpc ResolveID(ResolveResourceIDRequest) returns (ResolveResourceIDResponse);
}

enum ProjectValidationSeverity {
  PROJECT_VALIDATION_SEVERITY_UNSPECIFIED = 0;
  PROJECT_VALIDATION_SEVERITY_WARNING = 1;
  PROJECT_VALIDATION_SEVERITY_ERROR = 2;
}

enum ProjectChangeAction {
  PROJECT_CHANGE_ACTION_UNSPECIFIED = 0;
  PROJECT_CHANGE_ACTION_CREATED = 1;
  PROJECT_CHANGE_ACTION_UPDATED = 2;
  PROJECT_CHANGE_ACTION_REMOVED = 3;
  PROJECT_CHANGE_ACTION_UNCHANGED = 4;
}

enum ProjectWatchEventType {
  PROJECT_WATCH_EVENT_TYPE_UNSPECIFIED = 0;
  PROJECT_WATCH_EVENT_TYPE_APPLIED = 1;
  PROJECT_WATCH_EVENT_TYPE_REMOVED = 2;
  PROJECT_WATCH_EVENT_TYPE_CHANGED = 3;
}

enum RunStatus {
  RUN_STATUS_UNSPECIFIED = 0;
  RUN_STATUS_PENDING = 1;
  RUN_STATUS_RUNNING = 2;
  RUN_STATUS_SUCCEEDED = 3;
  RUN_STATUS_FAILED = 4;
  RUN_STATUS_CANCELED = 5;
}

enum RunSource {
  RUN_SOURCE_UNSPECIFIED = 0;
  RUN_SOURCE_MANUAL = 1;
  RUN_SOURCE_SCHEDULER = 2;
  RUN_SOURCE_API = 3;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_ENABLED = 1;
  AGENT_STATUS_DISABLED = 2;
}

enum ProjectAgentAvailability {
  PROJECT_AGENT_AVAILABILITY_UNSPECIFIED = 0;
  PROJECT_AGENT_AVAILABILITY_AVAILABLE = 1;
  PROJECT_AGENT_AVAILABILITY_UNAVAILABLE = 2;
  PROJECT_AGENT_AVAILABILITY_VALIDATION_FAILED = 3;
}

enum ProjectAgentHealth {
  PROJECT_AGENT_HEALTH_UNSPECIFIED = 0;
  PROJECT_AGENT_HEALTH_HEALTHY = 1;
  PROJECT_AGENT_HEALTH_AT_RISK = 2;
}

enum RunEventKind {
  RUN_EVENT_KIND_UNSPECIFIED = 0;
  RUN_EVENT_KIND_USER_MESSAGE = 1;
  RUN_EVENT_KIND_AGENT_MESSAGE = 2;
  RUN_EVENT_KIND_AGENT_ACTIVITY = 3;
  RUN_EVENT_KIND_STATUS = 4;
}

enum RunAgentStreamEventType {
  RUN_AGENT_STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  RUN_AGENT_STREAM_EVENT_TYPE_STARTED = 1;
  RUN_AGENT_STREAM_EVENT_TYPE_OUTPUT = 2;
  RUN_AGENT_STREAM_EVENT_TYPE_STATUS = 3;
  RUN_AGENT_STREAM_EVENT_TYPE_COMPLETED = 4;
}

enum RunSandboxCleanupPolicy {
  reserved "RUN_SESSION_CLEANUP_POLICY_UNSPECIFIED";
  reserved "RUN_SESSION_CLEANUP_POLICY_STOP_ON_COMPLETION";
  reserved "RUN_SESSION_CLEANUP_POLICY_KEEP_RUNNING";
  reserved "RUN_SESSION_CLEANUP_POLICY_REMOVE_ON_COMPLETION";

  RUN_SANDBOX_CLEANUP_POLICY_UNSPECIFIED = 0;
  RUN_SANDBOX_CLEANUP_POLICY_STOP_ON_COMPLETION = 1;
  RUN_SANDBOX_CLEANUP_POLICY_KEEP_RUNNING = 2;
  RUN_SANDBOX_CLEANUP_POLICY_REMOVE_ON_COMPLETION = 3;
}

enum ExecStreamEventType {
  EXEC_STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  EXEC_STREAM_EVENT_TYPE_STARTED = 1;
  EXEC_STREAM_EVENT_TYPE_OUTPUT = 2;
  EXEC_STREAM_EVENT_TYPE_COMPLETED = 3;
}

enum AttachRunMode {
  ATTACH_RUN_MODE_UNSPECIFIED = 0;
  ATTACH_RUN_MODE_COMMAND = 1;
  ATTACH_RUN_MODE_PROMPT = 2;
}

enum StdioStream {
  STDIO_STREAM_UNSPECIFIED = 0;
  STDIO_STREAM_STDOUT = 1;
  STDIO_STREAM_STDERR = 2;
}

enum ImageStoreKind {
  IMAGE_STORE_KIND_UNSPECIFIED = 0;
  IMAGE_STORE_KIND_DOCKER_DAEMON = 1;
  IMAGE_STORE_KIND_OCI_CACHE = 2;
}

enum ImageAvailabilityStatus {
  IMAGE_AVAILABILITY_STATUS_UNSPECIFIED = 0;
  IMAGE_AVAILABILITY_STATUS_AVAILABLE = 1;
  IMAGE_AVAILABILITY_STATUS_MISSING = 2;
  IMAGE_AVAILABILITY_STATUS_ERROR = 3;
}

enum ImageOperationStatus {
  IMAGE_OPERATION_STATUS_UNSPECIFIED = 0;
  IMAGE_OPERATION_STATUS_SUCCEEDED = 1;
  IMAGE_OPERATION_STATUS_FAILED = 2;
  IMAGE_OPERATION_STATUS_RUNNING = 3;
}

enum MetricStatus {
  METRIC_STATUS_UNSPECIFIED = 0;
  METRIC_STATUS_OK = 1;
  METRIC_STATUS_UNKNOWN = 2;
  METRIC_STATUS_UNAVAILABLE = 3;
}

enum CacheDomain {
  reserved 4;
  reserved "CACHE_DOMAIN_SANDBOX_EPHEMERAL_STATE";

  CACHE_DOMAIN_UNSPECIFIED = 0;
  CACHE_DOMAIN_OCI_IMAGE_STORE = 1;
  CACHE_DOMAIN_MATERIALIZED_IMAGE_CACHE = 2;
  CACHE_DOMAIN_RUNTIME_DERIVED_CACHE = 3;
  CACHE_DOMAIN_SKILL_ARTIFACT_CACHE = 5;
}

enum CacheReferencePolicy {
  CACHE_REFERENCE_POLICY_UNSPECIFIED = 0;
  CACHE_REFERENCE_POLICY_REQUIRED = 1;
  CACHE_REFERENCE_POLICY_ADVISORY = 2;
}

enum SandboxPruneCandidateKind {
  SANDBOX_PRUNE_CANDIDATE_KIND_UNSPECIFIED = 0;
  SANDBOX_PRUNE_CANDIDATE_KIND_SANDBOX_RECORD = 1;
  SANDBOX_PRUNE_CANDIDATE_KIND_RUNTIME_RESIDUE = 2;
}

enum CacheStatus {
  CACHE_STATUS_UNSPECIFIED = 0;
  CACHE_STATUS_ACTIVE = 1;
  CACHE_STATUS_REFERENCED = 2;
  CACHE_STATUS_UNUSED = 3;
  CACHE_STATUS_EXPIRED = 4;
  CACHE_STATUS_ORPHANED = 5;
  CACHE_STATUS_UNKNOWN = 6;
}

enum ResourceKind {
  RESOURCE_KIND_UNSPECIFIED = 0;
  RESOURCE_KIND_PROJECT = 1;
  RESOURCE_KIND_AGENT = 2;
  RESOURCE_KIND_RUN = 3;
  RESOURCE_KIND_SANDBOX = 4;
  RESOURCE_KIND_IMAGE = 5;
  RESOURCE_KIND_CACHE = 6;
}

message ValidateProjectRequest {
  ProjectSpec spec = 1;
  ProjectSource source = 2;
  string expected_spec_hash = 3;
}

message ValidateProjectResponse {
  bool valid = 1;
  repeated ProjectValidationIssue issues = 2;
  string spec_hash = 3;
}

message ApplyProjectRequest {
  ProjectSpec spec = 1;
  ProjectSource source = 2;
  string expected_spec_hash = 3;
  bool dry_run = 4;
}

message ApplyProjectResponse {
  Project project = 1;
  ProjectRevision revision = 2;
  repeated ProjectChange changes = 3;
  repeated ProjectValidationIssue issues = 4;
  bool applied = 5;
  bool unchanged = 6;
}

message GetProjectRequest {
  ProjectRef project = 1;
  bool include_spec = 2;
}

message GetProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  string query = 1;
  bool include_removed = 2;
  uint32 offset = 3;
  uint32 limit = 4;
}

message ListProjectsResponse {
  repeated ProjectSummary projects = 1;
  uint32 total_count = 2;
  bool has_more = 3;
  uint32 next_offset = 4;
}

message RemoveProjectRequest {
  reserved "stop_running_sessions";

  ProjectRef project = 1;
  bool remove_history = 2;
  bool stop_running_sandboxes = 3;
}

message RemoveProjectResponse {
  Project project = 1;
  repeated ProjectChange changes = 2;
}

message WatchProjectRequest {
  ProjectRef project = 1;
}

message WatchProjectResponse {
  ProjectWatchEventType type = 1;
  Project project = 2;
  ProjectRevision revision = 3;
  repeated ProjectChange changes = 4;
}

message ProjectRef {
  string project_id = 1;
  string name = 2;
  string source_path = 3;
}

message ProjectSource {
  string compose_path = 1;
  string project_dir = 2;
}

message Project {
  ProjectSummary summary = 1;
  ProjectSpec spec = 2;
  repeated ProjectAgent agents = 3;
  repeated ProjectScheduler schedulers = 4;
}

message ProjectSummary {
  string project_id = 1;
  string name = 2;
  string source_path = 3;
  uint64 current_revision = 4;
  string spec_hash = 5;
  uint32 agent_count = 6;
  uint32 scheduler_count = 7;
  uint32 running_run_count = 8;
  string latest_run_id = 9;
  string created_at = 10;
  string updated_at = 11;
  string removed_at = 12;
}

message ProjectRevision {
  string project_id = 1;
  uint64 revision = 2;
  string spec_hash = 3;
  ProjectSpec spec = 4;
  string created_at = 5;
}

message ProjectAgent {
  string project_id = 1;
  string agent_name = 2;
  string managed_agent_id = 3;
  string provider = 4;
  string model = 5;
  string image = 6;
  string driver = 7;
  bool scheduler_enabled = 8;
  bool enabled = 9;
  ProjectAgentAvailability availability = 10;
  ProjectAgentHealth health = 11;
  ProjectAgentCurrentRun current_run = 12;
  ProjectAgentLatestRun latest_run = 13;
  string display_name = 14;
  string description = 15;
}

message ProjectAgentCurrentRun {
  string text = 1;
  uint32 running_run_count = 2;
  uint32 running_scheduler_run_count = 3;
}

message ProjectAgentLatestRun {
  string run_id = 1;
  RunStatus status = 2;
  RunSource source = 3;
  google.protobuf.Timestamp at = 4;
}

message ProjectScheduler {
  reserved 4;
  reserved "managed_loader_id";

  string project_id = 1;
  string agent_name = 2;
  string scheduler_id = 3;
  bool enabled = 5;
  uint32 trigger_count = 6;
  string display_name = 7;
  string description = 8;
}

message GetSchedulerRequest {
  ProjectRef project = 1;
  string agent_name = 2;
}

message GetSchedulerResponse {
  ProjectScheduler scheduler = 1;
  SchedulerSpec spec = 2;
  repeated ResolvedTrigger triggers = 3;
  bool overridden = 4;
}

message ResolvedTrigger {
  TriggerSpec spec = 1;
  string trigger_id = 2;
  bool enabled = 3;
  bool overridden = 4;
  google.protobuf.Timestamp next_fire_at = 5;
  google.protobuf.Timestamp last_fired_at = 6;
}

message ListSchedulersRequest {
  string query = 1;
  uint32 limit = 2;
  string cursor = 3;
}

message SchedulerSummary {
  string project_id = 1;
  string agent_name = 2;
  string scheduler_id = 3;
  bool enabled = 4;
  uint32 trigger_count = 5;
  uint32 run_count = 6;
  google.protobuf.Timestamp latest_run_at = 7;
  string last_error = 8;
  string display_name = 9;
  string description = 10;
}

message ListSchedulersResponse {
  repeated SchedulerSummary schedulers = 1;
  string next_cursor = 2;
}

message ListSchedulerEventsRequest {
  ProjectRef project = 1;
  string agent_name = 2;
  uint32 limit = 3;
  string cursor = 4;
}

message SchedulerEvent {
  string id = 1;
  string type = 2;
  string level = 3;
  string message = 4;
  string payload_json = 5;
  string run_id = 6;
  string trigger_id = 7;
  google.protobuf.Timestamp created_at = 8;
}

message ListSchedulerEventsResponse {
  repeated SchedulerEvent events = 1;
  string next_cursor = 2;
}

message SetSchedulerEnabledRequest {
  ProjectRef project = 1;
  string agent_name = 2;
  bool enabled = 3;
}

message SetSchedulerEnabledResponse {
  ProjectScheduler scheduler = 1;
  bool overridden = 2;
}

message SetSchedulerTriggerEnabledRequest {
  ProjectRef project = 1;
  string agent_name = 2;
  string trigger_id = 3;
  bool enabled = 4;
}

message SetSchedulerTriggerEnabledResponse {
  ResolvedTrigger trigger = 1;
}

message ProjectValidationIssue {
  ProjectValidationSeverity severity = 1;
  string path = 2;
  string message = 3;
}

message ProjectChange {
  ProjectChangeAction action = 1;
  string resource_type = 2;
  string resource_id = 3;
  string name = 4;
  string message = 5;
}

message ProjectSpec {
  string name = 1;
  repeated EnvVarSpec variables = 2;
  reserved 3;
  reserved "workspace";
  repeated AgentSpec agents = 4;
  NetworkSpec network = 5;
  repeated ProjectVolumeSpec volumes = 6;
  repeated NamedWorkspaceSpec workspaces = 7;
  repeated MCPServerSpec mcp_servers = 8;
}

message NamedWorkspaceSpec {
  string name = 1;
  WorkspaceSpec workspace = 2;
}

message AgentSpec {
  string name = 1;
  string provider = 2;
  string model = 3;
  string system_prompt = 4;
  string image = 5;
  DriverSpec driver = 6;
  repeated EnvVarSpec env = 7;
  WorkspaceSpec workspace = 8;
  SchedulerSpec scheduler = 9;
  repeated string capset_ids = 10;
  JupyterSpec jupyter = 11;
  BuildSpec build = 12;
  repeated VolumeMountSpec volumes = 13;
  repeated MCPServerSpec mcp_servers = 14;
  repeated SkillSpec skills = 15;
  AgentStatus status = 16;
  string display_name = 17;
  string description = 18;
}

message MCPServerSpec {
  string name = 1;
  string type = 2;
  string transport = 3;
  string command = 4;
  repeated string args = 5;
  repeated EnvVarSpec env = 6;
  string url = 7;
  repeated EnvVarSpec headers = 8;
}

message ProjectVolumeSpec {
  string key = 1;
  string name = 2;
  string driver = 3;
  bool external = 4;
  map<string, string> labels = 5;
  map<string, string> options = 6;
}

message VolumeMountSpec {
  string type = 1;
  string source = 2;
  string target = 3;
  bool read_only = 4;
}

message BuildSpec {
  string context = 1;
  string dockerfile = 2;
  string target = 3;
  map<string, string> args = 4;
  repeated string platforms = 5;
  repeated string tags = 6;
  bool no_cache = 7;
  bool pull = 8;
}

message EnvVarSpec {
  string name = 1;
  string value = 2;
  bool secret = 3;
}

message EnvVarUpdateSpec {
  string name = 1;
  optional string value = 2;
  bool secret = 3;
}

message WorkspaceSpec {
  string provider = 1;
  string url = 2;
  string branch = 3;
  string path = 4;
  string name = 5;
  string commit = 6;
}

message NetworkSpec {
  string mode = 1;
}

message SchedulerSpec {
  bool enabled = 1;
  repeated TriggerSpec triggers = 2;
  string script = 3;
  string sandbox_policy = 4;
  string display_name = 5;
  string description = 6;
}

message TriggerSpec {
  string name = 1;
  string kind = 2;
  string cron = 3;
  string interval = 4;
  string timeout = 5;
  EventTriggerSpec event = 6;
  string prompt = 7;
  string sandbox_policy = 8;
}

message EventTriggerSpec {
  string topic = 1;
}

message DriverSpec {
  string name = 1;
  BoxliteDriverSpec boxlite = 2;
  DockerDriverSpec docker = 3;
  MicrosandboxDriverSpec microsandbox = 4;
}

message BoxliteDriverSpec {
  string kernel = 1;
  string rootfs = 2;
}

message DockerDriverSpec {
  string host = 1;
}

message MicrosandboxDriverSpec {
  string profile = 1;
}

message RunAgentRequest {
  reserved 5;
  reserved "session_id";

  string project_id = 1;
  string agent_name = 2;
  string prompt = 3;
  RunSource source = 4;
  repeated EnvVarSpec env = 6;
  RunSandboxCleanupPolicy cleanup_policy = 7;
  string scheduler_id = 8;
  string trigger_id = 9;
  string output_schema_json = 10;
  string client_request_id = 11;
  string command = 12;
  RunJupyterSpec jupyter = 13;
  string driver = 14;
  string sandbox_id = 15;
  repeated VolumeMountSpec volumes = 16;
  string payload_json = 17;
}

message RunAgentResponse {
  RunDetail run = 1;
  repeated string warnings = 2;
}

message RunAgentStreamResponse {
  RunAgentStreamEventType event_type = 1;
  RunSummary run = 2;
  string run_id = 3;
  string chunk = 4;
  StdioStream stream = 5;
  string created_at = 6;
  repeated string warnings = 7;
  TranscriptEvent transcript = 8;
}

message RunAttachRequest {
  string client_frame_id = 15;

  oneof frame {
    RunAttachStart start = 1;
    AttachStdin stdin = 2;
    AttachStdinEOF stdin_eof = 3;
    AttachResize resize = 4;
    AttachSignal signal = 5;
    AttachHumanMessage human_message = 6;
    AttachCancel cancel = 7;
  }
}

message RunAttachResponse {
  string server_frame_id = 15;
  string created_at = 16;

  oneof frame {
    AttachStarted started = 1;
    AttachOutput output = 2;
    AttachAgentEvent agent_event = 3;
    AttachAgentTurnCompleted agent_turn_completed = 4;
    AttachResult result = 5;
    AttachError error = 6;
  }
}

message RunAttachStart {
  RunAgentRequest request = 1;
  AttachRunMode mode = 2;
  bool attach_stdin = 3;
  bool tty = 4;
  AttachTerminalSize terminal_size = 5;
}

message TranscriptEvent {
  StdioStream stream = 1;
  string text = 2;
  string name = 4;
  string payload_json = 5;
  string created_at = 6;
}

message GetRunRequest {
  string run_id = 1;
  string project_id = 2;
}

message GetRunResponse {
  RunDetail run = 1;
}

message ListRunsRequest {
  reserved 3;
  reserved "session_id";

  string project_id = 1;
  string agent_name = 2;
  string scheduler_id = 4;
  RunStatus status = 5;
  RunSource source = 6;
  string started_from = 7;
  string started_to = 8;
  uint32 offset = 9;
  uint32 limit = 10;
  string sandbox_id = 11;
}

message ListRunsResponse {
  repeated RunSummary runs = 1;
}

message FollowRunLogsRequest {
  string project_id = 1;
  string run_id = 2;
  uint32 tail_lines = 3;
  uint64 start_offset = 4;
  bool follow = 5;
}

message RunLogChunk {
  string data = 1;
  uint64 offset = 2;
  bool is_final = 3;
  RunStatus run_status = 4;
  string created_at = 5;
}

message StopRunRequest {
  string run_id = 1;
  string reason = 2;
}

message StopRunResponse {
  RunDetail run = 1;
  bool stop_requested = 2;
}

message ListRunEventsRequest {
  string run_id = 1;
  uint32 limit = 2;
  string cursor = 3;
}

message RunEvent {
  string id = 1;
  string run_id = 2;
  uint64 seq = 3;
  RunEventKind kind = 4;
  string text = 5;
  string agent = 6;
  string name = 7;
  string payload_json = 8;
  bool success = 9;
  int32 exit_code = 10;
  string stop_reason = 11;
  google.protobuf.Timestamp created_at = 12;
}

message ListRunEventsResponse {
  repeated RunEvent events = 1;
  string next_cursor = 2;
  bool history_available = 3;
}

message ListSandboxRunEventsRequest {
  string sandbox_id = 1;
  uint32 limit = 2;
  string cursor = 3;
}

message ListSandboxRunEventsResponse {
  repeated RunEvent events = 1;
  string next_cursor = 2;
  repeated string history_available_run_ids = 3;
}

message RemoveSandboxRequest {
  string sandbox_id = 1;
  bool force = 2;
}

message RemoveSandboxResponse {
  string sandbox_id = 1;
  bool stopped = 2;
  bool removed = 3;
}

message PruneSandboxesRequest {
  string project_id = 1;
  repeated string status = 2;
  string agent_name = 3;
  string driver = 4;
  uint64 older_than_seconds = 5;
  bool include_orphans = 6;
  bool force = 7;
}

message SandboxPruneCandidate {
  SandboxPruneCandidateKind kind = 1;
  string sandbox_id = 2;
  string project_id = 3;
  string agent_name = 4;
  string driver = 5;
  string status = 6;
  string runtime_id = 7;
  google.protobuf.Timestamp updated_at = 8;
  bool removable = 9;
  repeated string blocked_reasons = 10;
}

message PruneSandboxesResponse {
  bool dry_run = 1;
  repeated SandboxPruneCandidate matched = 2;
  repeated string removed = 3;
