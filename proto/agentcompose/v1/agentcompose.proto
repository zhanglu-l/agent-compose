syntax = "proto3";

package agentcompose.v1;

option go_package = "agent-compose/proto/agentcompose/v1;agentcomposev1";

import "google/protobuf/empty.proto";

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (SessionResponse);
  rpc ResumeSession(SessionIDRequest) returns (SessionResponse);
  rpc StopSession(SessionIDRequest) returns (SessionResponse);
  rpc GetSession(SessionIDRequest) returns (SessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSessionProxy(SessionIDRequest) returns (SessionProxyResponse);
  rpc WatchSession(SessionIDRequest) returns (stream WatchSessionResponse);
}

service KernelService {
  rpc ExecuteCell(ExecuteCellRequest) returns (ExecuteCellResponse);
  rpc ExecuteCellStream(ExecuteCellRequest) returns (stream ExecuteCellStreamResponse);
  rpc ListCells(SessionIDRequest) returns (ListCellsResponse);
}

service AgentService {
  rpc SendAgentMessage(SendAgentMessageRequest) returns (SendAgentMessageResponse);
  rpc SendAgentMessageStream(SendAgentMessageRequest) returns (stream SendAgentMessageStreamResponse);
  rpc ListSessionEvents(SessionIDRequest) returns (ListSessionEventsResponse);
}

service AgentDefinitionService {
  rpc ListAgentDefinitions(ListAgentDefinitionsRequest) returns (ListAgentDefinitionsResponse);
  rpc GetAgentDefinition(AgentDefinitionIDRequest) returns (AgentDefinitionResponse);
  rpc CreateAgentDefinition(CreateAgentDefinitionRequest) returns (AgentDefinitionResponse);
  rpc UpdateAgentDefinition(UpdateAgentDefinitionRequest) returns (AgentDefinitionResponse);
  rpc DeleteAgentDefinition(AgentDefinitionIDRequest) returns (google.protobuf.Empty);
  rpc SetAgentDefinitionEnabled(SetAgentDefinitionEnabledRequest) returns (AgentDefinitionResponse);
  rpc ValidateAgentDefinition(ValidateAgentDefinitionRequest) returns (ValidateAgentDefinitionResponse);
  rpc CreateAgentSession(CreateAgentSessionRequest) returns (SessionResponse);
}

service LLMService {
  rpc Generate(GenerateLLMRequest) returns (GenerateLLMResponse);
}

service ConfigService {
  rpc GetGlobalEnvConfig(google.protobuf.Empty) returns (GlobalEnvConfigResponse);
  rpc UpdateGlobalEnvConfig(UpdateGlobalEnvConfigRequest) returns (GlobalEnvConfigResponse);
  rpc GetCapabilityGatewayConfig(google.protobuf.Empty) returns (CapabilityGatewayConfig);
  rpc UpdateCapabilityGatewayConfig(UpdateCapabilityGatewayConfigRequest) returns (CapabilityGatewayConfig);
  rpc ListWorkspaceConfigs(google.protobuf.Empty) returns (ListWorkspaceConfigsResponse);
  rpc CreateWorkspaceConfig(CreateWorkspaceConfigRequest) returns (WorkspaceConfigResponse);
  rpc UpdateWorkspaceConfig(UpdateWorkspaceConfigRequest) returns (WorkspaceConfigResponse);
  rpc DeleteWorkspaceConfig(WorkspaceConfigIDRequest) returns (google.protobuf.Empty);
}

service LoaderService {
  rpc ValidateLoader(ValidateLoaderRequest) returns (ValidateLoaderResponse);
  rpc ListLoaders(google.protobuf.Empty) returns (ListLoadersResponse);
  rpc GetLoader(LoaderIDRequest) returns (LoaderResponse);
  rpc CreateLoader(CreateLoaderRequest) returns (LoaderResponse);
  rpc UpdateLoader(UpdateLoaderRequest) returns (LoaderResponse);
  rpc DeleteLoader(LoaderIDRequest) returns (google.protobuf.Empty);
  rpc SetLoaderEnabled(SetLoaderEnabledRequest) returns (LoaderResponse);
  rpc SetLoaderTriggerEnabled(SetLoaderTriggerEnabledRequest) returns (LoaderResponse);
  rpc RunLoaderNow(RunLoaderNowRequest) returns (LoaderRunResponse);
  rpc ListLoaderRuns(ListLoaderRunsRequest) returns (ListLoaderRunsResponse);
  rpc GetLoaderRun(LoaderRunIDRequest) returns (LoaderRunResponse);
  rpc ListLoaderEvents(ListLoaderEventsRequest) returns (ListLoaderEventsResponse);
}

service DashboardService {
  rpc GetDashboardOverview(google.protobuf.Empty) returns (DashboardOverviewResponse);
  rpc WatchDashboardOverview(google.protobuf.Empty) returns (stream DashboardOverviewEvent);
}

service CapabilityService {
  rpc GetCapabilityStatus(GetCapabilityStatusRequest) returns (CapabilityStatusResponse);
  rpc ListCapabilitySets(ListCapabilitySetsRequest) returns (ListCapabilitySetsResponse);
  rpc GetCapabilityCatalog(GetCapabilityCatalogRequest) returns (GetCapabilityCatalogResponse);
}

enum CellType {
  CELL_TYPE_UNSPECIFIED = 0;
  CELL_TYPE_SHELL = 1;
  CELL_TYPE_JAVASCRIPT = 2;
  CELL_TYPE_PYTHON = 3;
  CELL_TYPE_AGENT = 4;
}

enum ExecuteCellStreamEventType {
  EXECUTE_CELL_STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  EXECUTE_CELL_STREAM_EVENT_TYPE_STARTED = 1;
  EXECUTE_CELL_STREAM_EVENT_TYPE_OUTPUT = 2;
  EXECUTE_CELL_STREAM_EVENT_TYPE_COMPLETED = 3;
}

enum SendAgentMessageStreamEventType {
  SEND_AGENT_MESSAGE_STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  SEND_AGENT_MESSAGE_STREAM_EVENT_TYPE_STARTED = 1;
  SEND_AGENT_MESSAGE_STREAM_EVENT_TYPE_OUTPUT = 2;
  SEND_AGENT_MESSAGE_STREAM_EVENT_TYPE_COMPLETED = 3;
}

enum WatchSessionEventType {
  WATCH_SESSION_EVENT_TYPE_UNSPECIFIED = 0;
  WATCH_SESSION_EVENT_TYPE_SESSION_UPDATED = 1;
  WATCH_SESSION_EVENT_TYPE_CELL_STARTED = 2;
  WATCH_SESSION_EVENT_TYPE_CELL_OUTPUT = 3;
  WATCH_SESSION_EVENT_TYPE_CELL_COMPLETED = 4;
  WATCH_SESSION_EVENT_TYPE_EVENT_ADDED = 5;
}

enum LoaderTriggerKind {
  LOADER_TRIGGER_KIND_UNSPECIFIED = 0;
  LOADER_TRIGGER_KIND_INTERVAL = 1;
  LOADER_TRIGGER_KIND_EVENT = 2;
  LOADER_TRIGGER_KIND_TIMEOUT = 3;
  LOADER_TRIGGER_KIND_CRON = 4;
}

enum AgentAvailabilityStatus {
  AGENT_AVAILABILITY_STATUS_UNSPECIFIED = 0;
  AGENT_AVAILABILITY_STATUS_AVAILABLE = 1;
  AGENT_AVAILABILITY_STATUS_UNAVAILABLE = 2;
  AGENT_AVAILABILITY_STATUS_VALIDATION_FAILED = 3;
}

enum AgentHealthStatus {
  AGENT_HEALTH_STATUS_UNSPECIFIED = 0;
  AGENT_HEALTH_STATUS_HEALTHY = 1;
  AGENT_HEALTH_STATUS_AT_RISK = 2;
}

enum AgentCurrentRunStatus {
  AGENT_CURRENT_RUN_STATUS_UNSPECIFIED = 0;
  AGENT_CURRENT_RUN_STATUS_IDLE = 1;
  AGENT_CURRENT_RUN_STATUS_HAS_RUNNING_SESSION = 2;
}

enum AgentWorkFilesSource {
  AGENT_WORK_FILES_SOURCE_UNSPECIFIED = 0;
  AGENT_WORK_FILES_SOURCE_EMPTY = 1;
  AGENT_WORK_FILES_SOURCE_FILE_WORKSPACE = 2;
  AGENT_WORK_FILES_SOURCE_GIT_WORKSPACE = 3;
}

message SessionIDRequest {
  string session_id = 1;
}

message SessionTag {
  string name = 1;
  string value = 2;
}

message SessionEnvVar {
  string name = 1;
  string value = 2;
  bool secret = 3;
}

message CreateSessionRequest {
  string title = 1;
  string base_workspace = 2;
  repeated SessionTag tags = 5;
  repeated SessionEnvVar env_items = 6;
  string workspace_id = 7;
  string guest_image = 8;
  string driver = 9;
  repeated string capset_ids = 10;
}

message WorkspaceConfig {
  string id = 1;
  string name = 2;
  string type = 3;
  string config_json = 4;
  string comment = 5;
  string created_at = 6;
  string updated_at = 7;
}

message SessionWorkspaceSnapshot {
  string id = 1;
  string name = 2;
  string type = 3;
  string config_json = 4;
}

message WorkspaceConfigIDRequest {
  string workspace_id = 1;
}

message CreateWorkspaceConfigRequest {
  string name = 1;
  string type = 2;
  string config_json = 3;
  string comment = 4;
}

message UpdateWorkspaceConfigRequest {
  string workspace_id = 1;
  string name = 2;
  string type = 3;
  string config_json = 4;
  string comment = 5;
}

message WorkspaceConfigResponse {
  WorkspaceConfig workspace = 1;
}

message ListWorkspaceConfigsResponse {
  repeated WorkspaceConfig workspaces = 1;
}

message SessionSummary {
  string session_id = 1;
  string title = 2;
  string driver = 3;
  string vm_status = 4;
  string workspace_path = 5;
  string proxy_path = 6;
  string created_at = 7;
  string updated_at = 8;
  uint32 cell_count = 9;
  uint32 event_count = 10;
  repeated SessionTag tags = 11;
  string guest_image = 12;
  string trigger_source = 13;
}

message ListSessionsRequest {
  string session_type = 1;
  string trigger_source_query = 2;
  string title_query = 3;
  string workspace_query = 4;
  string driver = 5;
  string vm_status = 6;
  string created_from = 7;
  string created_to = 8;
  string updated_from = 9;
  string updated_to = 10;
  uint32 offset = 11;
  uint32 limit = 12;
}

message SessionDetail {
  SessionSummary summary = 1;
  repeated SessionEnvVar env_items = 4;
  string workspace_id = 5;
  SessionWorkspaceSnapshot workspace = 6;
}

message SessionResponse {
  SessionDetail session = 1;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
  uint32 total_count = 2;
  bool has_more = 3;
  uint32 next_offset = 4;
}

message SessionProxyResponse {
  string session_id = 1;
  string proxy_path = 2;
  string notebook_url = 3;
  string driver = 4;
  string vm_status = 5;
}

message WatchSessionResponse {
  WatchSessionEventType event_type = 1;
  SessionSummary session = 2;
  NotebookCell cell = 3;
  SessionEvent event = 4;
  string cell_id = 5;
  string chunk = 6;
  bool is_stderr = 7;
}

message NotebookCell {
  string id = 1;
  string source = 2;
  string stdout = 3 [deprecated = true];
  string stderr = 4 [deprecated = true];
  bool success = 5;
  string created_at = 6;
  CellType type = 7;
  int32 exit_code = 8;
  string output = 9;
  string agent = 10;
  string agent_session_id = 11;
  string stop_reason = 12;
  bool running = 13;
}

message ExecuteCellRequest {
  string session_id = 1;
  string source = 2;
  CellType type = 3;
}

message ExecuteCellResponse {
  SessionSummary session = 1;
  NotebookCell cell = 2;
}

message ExecuteCellStreamResponse {
  ExecuteCellStreamEventType event_type = 1;
  SessionSummary session = 2;
  NotebookCell cell = 3;
  string cell_id = 4;
  string chunk = 5;
  bool is_stderr = 6;
}

message ListCellsResponse {
  string session_id = 1;
  repeated NotebookCell cells = 2;
}

message SessionEvent {
  string id = 1;
  string type = 2;
  string level = 3;
  string message = 4;
  string created_at = 5;
}

message AgentRun {
  string id = 1;
  string agent = 2;
  string message = 3;
  string output = 4;
  int32 exit_code = 5;
  bool success = 6;
  string created_at = 7;
  string agent_session_id = 8;
  string stop_reason = 9;
  bool running = 10;
}

message SendAgentMessageRequest {
  string session_id = 1;
  string message = 2;
  string agent = 3;
}

message SendAgentMessageResponse {
  SessionEvent user_event = 1;
  SessionEvent assistant_event = 2;
}

message SendAgentMessageStreamResponse {
  SendAgentMessageStreamEventType event_type = 1;
  SessionSummary session = 2;
  AgentRun run = 3;
  string run_id = 4;
  string chunk = 5;
  bool is_stderr = 6;
  SessionEvent user_event = 7;
  SessionEvent assistant_event = 8;
}

message GenerateLLMRequest {
  string prompt = 1;
  string model = 2;
  string output_schema = 3;
}

message GenerateLLMResponse {
  string text = 1;
  string model = 2;
  string response_id = 3;
  string finish_reason = 4;
  string json = 5;
}

message ListSessionEventsResponse {
  string session_id = 1;
  repeated SessionEvent events = 2;
}

message AgentDefinition {
  string agent_id = 1;
  string name = 2;
  string description = 3;
  bool enabled = 4;
  string provider = 5;
  string model = 6;
  string system_prompt = 7;
  string runtime_image_id = 8;
  string driver = 9;
  string guest_image = 10;
  AgentWorkFiles work_files = 11;
  repeated SessionEnvVar env_items = 12;
  string config_json = 13;
  AgentAvailabilityStatus availability_status = 14;
  AgentHealthStatus health_status = 15;
  AgentCurrentRunSummary current_run_summary = 16;
  AgentLatestRunSummary latest_run_summary = 17;
  string created_at = 18;
  string updated_at = 19;
  string deleted_at = 20;
  repeated string capset_ids = 21;
}

message AgentWorkFiles {
  AgentWorkFilesSource source = 1;
  string workspace_id = 2;
  string workspace_name = 3;
  string workspace_type = 4;
  string summary = 5;
  string config_json = 6;
}

message AgentCurrentRunSummary {
  AgentCurrentRunStatus status = 1;
  string text = 2;
  uint32 running_session_count = 3;
  uint32 running_loader_run_count = 4;
}

message AgentLatestRunSummary {
  string run_type = 1;
  string status = 2;
  string run_id = 3;
  string title = 4;
  string at = 5;
}

message AgentDefinitionIDRequest {
  string agent_id = 1;
}

message AgentDefinitionResponse {
  AgentDefinition agent = 1;
}

message ListAgentDefinitionsRequest {
  string query = 1;
  bool include_disabled = 2;
  uint32 offset = 3;
  uint32 limit = 4;
}

message ListAgentDefinitionsResponse {
  repeated AgentDefinition agents = 1;
  uint32 total_count = 2;
  bool has_more = 3;
  uint32 next_offset = 4;
}

message CreateAgentDefinitionRequest {
  string name = 1;
  string description = 2;
  bool enabled = 3;
  string provider = 4;
  string model = 5;
  string system_prompt = 6;
  string runtime_image_id = 7;
  string driver = 8;
  string guest_image = 9;
  string workspace_id = 10;
  repeated SessionEnvVar env_items = 11;
  string config_json = 12;
  repeated string capset_ids = 13;
}

message UpdateAgentDefinitionRequest {
  string agent_id = 1;
  string name = 2;
  string description = 3;
  bool enabled = 4;
  string provider = 5;
  string model = 6;
  string system_prompt = 7;
  string runtime_image_id = 8;
  string driver = 9;
  string guest_image = 10;
  string workspace_id = 11;
  repeated SessionEnvVar env_items = 12;
  string config_json = 13;
  repeated string capset_ids = 14;
}

message SetAgentDefinitionEnabledRequest {
  string agent_id = 1;
  bool enabled = 2;
}

message ValidateAgentDefinitionRequest {
  string agent_id = 1;
  string name = 2;
  string provider = 3;
  string model = 4;
  string system_prompt = 5;
  string runtime_image_id = 6;
  string driver = 7;
  string guest_image = 8;
  string workspace_id = 9;
  repeated SessionEnvVar env_items = 10;
  string config_json = 11;
}

message ValidateAgentDefinitionResponse {
  AgentAvailabilityStatus availability_status = 1;
  AgentHealthStatus health_status = 2;
  repeated string warnings = 3;
  repeated string errors = 4;
}

message CreateAgentSessionRequest {
  reserved 7;
  reserved "capset_ids";

  string agent_id = 1;
  string title = 2;
  repeated SessionEnvVar env_items = 3;
  string workspace_id = 4;
  string driver = 5;
  string guest_image = 6;
}

message UpdateGlobalEnvConfigRequest {
  repeated SessionEnvVar env_items = 1;
}

message GlobalEnvConfigResponse {
  repeated SessionEnvVar env_items = 1;
}

message CapabilityGatewayConfig {
  string addr = 1;
  bool token_set = 2;
}

message UpdateCapabilityGatewayConfigRequest {
  string addr = 1;
  string token = 2;
}

message LoaderIDRequest {
  string loader_id = 1;
}

message LoaderRunIDRequest {
  string loader_id = 1;
  string run_id = 2;
}

message LoaderTrigger {
  string loader_id = 1;
  string trigger_id = 2;
  LoaderTriggerKind kind = 3;
  string topic = 4;
  int64 interval_ms = 5;
  bool enabled = 6;
  bool auto_id = 7;
  string spec_json = 8;
  string next_fire_at = 9;
  string last_fired_at = 10;
}

message LoaderSummary {
  string loader_id = 1;
  string name = 2;
  string description = 3;
  bool enabled = 4;
  string runtime = 5;
  string workspace_id = 6;
  string driver = 7;
  string guest_image = 8;
  string default_agent = 9;
  string session_policy = 10;
  string concurrency_policy = 11;
  string created_at = 12;
  string updated_at = 13;
  string last_error = 14;
  uint32 trigger_count = 15;
  uint32 run_count = 16;
  uint32 event_count = 17;
  string latest_run_at = 18;
  string agent_id = 19;
  repeated string capset_ids = 20;
}

message LoaderDetail {
  LoaderSummary summary = 1;
  string script = 2;
  repeated LoaderTrigger triggers = 3;
  repeated SessionEnvVar env_items = 4;
  repeated string capset_ids = 5;
}

message LoaderResponse {
  LoaderDetail loader = 1;
}

message ListLoadersResponse {
  repeated LoaderSummary loaders = 1;
}

message CreateLoaderRequest {
  string name = 1;
  string description = 2;
  string runtime = 3;
  string script = 4;
  string workspace_id = 5;
  string driver = 6;
  string guest_image = 7;
  string default_agent = 8;
  string session_policy = 9;
  string concurrency_policy = 10;
  repeated SessionEnvVar env_items = 11;
  bool enabled = 12;
  string agent_id = 13;
  repeated string capset_ids = 14;
}

message UpdateLoaderRequest {
  string loader_id = 1;
  string name = 2;
  string description = 3;
  string runtime = 4;
  string script = 5;
  string workspace_id = 6;
  string driver = 7;
  string guest_image = 8;
  string default_agent = 9;
  string session_policy = 10;
  string concurrency_policy = 11;
  repeated SessionEnvVar env_items = 12;
  bool enabled = 13;
  string agent_id = 14;
  repeated string capset_ids = 15;
}

message GetCapabilityStatusRequest {}

message CapabilityStatusResponse {
  bool configured = 1;
  bool ok = 2;
  string status = 3;
  uint32 service_count = 4;
  string error = 5;
  bool runtime_configured = 6;
  bool proxy_listen_configured = 7;
  bool proxy_target_configured = 8;
}

message ListCapabilitySetsRequest {}

message CapabilitySet {
  string id = 1;
  string name = 2;
  string description = 3;
  bool enabled = 4;
}

message ListCapabilitySetsResponse {
  repeated CapabilitySet capsets = 1;
}

message GetCapabilityCatalogRequest {
  string capset_id = 1;
}

message CapabilityEndpoint {
  string protocol = 1;
  string endpoint = 2;
  string method_path = 3;
  map<string, string> metadata = 4;
  string tool_name = 5;
  string procedure = 6;
  string http_method = 7;
  repeated string content_types = 8;
}

message CapabilityMethod {
  string service_id = 1;
  string instance_id = 2;
  string runtime_mode = 3;
  string method_full_name = 4;
  string request_message_full_name = 5;
  string response_message_full_name = 6;
  string backend_instance_status = 7;
  repeated CapabilityEndpoint endpoints = 8;
}

message GetCapabilityCatalogResponse {
  string capset_id = 1;
  string name = 2;
  string description = 3;
  repeated CapabilityMethod methods = 4;
}

message ValidateLoaderRequest {
  string script = 1;
  string runtime = 2;
}

message ValidateLoaderResponse {
  repeated LoaderTrigger triggers = 1;
  repeated string warnings = 2;
}

message SetLoaderEnabledRequest {
  string loader_id = 1;
  bool enabled = 2;
}

message SetLoaderTriggerEnabledRequest {
  string loader_id = 1;
  string trigger_id = 2;
  bool enabled = 3;
}

message LoaderRunSummary {
  string run_id = 1;
  string loader_id = 2;
  string trigger_id = 3;
  LoaderTriggerKind trigger_kind = 4;
  string trigger_source = 5;
  string status = 6;
  string started_at = 7;
  string completed_at = 8;
  int64 duration_ms = 9;
  string error = 10;
  string result_json = 11;
  string payload_json = 12;
  string source_script_sha256 = 13;
  string artifacts_dir = 14;
}

message LoaderRunDetail {
  LoaderRunSummary summary = 1;
}

message LoaderRunResponse {
  LoaderRunDetail run = 1;
}

message ListLoaderRunsRequest {
  string loader_id = 1;
  uint32 limit = 2;
}

message ListLoaderRunsResponse {
  repeated LoaderRunSummary runs = 1;
}

message RunLoaderNowRequest {
  string loader_id = 1;
  string trigger_id = 2;
  string payload_json = 3;
  string timeout = 4;
}

message LoaderEvent {
  string id = 1;
  string loader_id = 2;
  string run_id = 3;
  string trigger_id = 4;
  string type = 5;
  string level = 6;
  string message = 7;
  string payload_json = 8;
  string linked_session_id = 9;
  string linked_cell_id = 10;
  string linked_agent_session_id = 11;
  string created_at = 12;
}

message ListLoaderEventsRequest {
  string loader_id = 1;
  uint32 limit = 2;
}

message ListLoaderEventsResponse {
  repeated LoaderEvent events = 1;
}

message DashboardOverviewResponse {
  DashboardOverview overview = 1;
}

message DashboardOverviewEvent {
  DashboardOverview overview = 1;
  string reason = 2;
}

message DashboardOverview {
  RunOverview runs = 1;
  string updated_at = 99;
}

message RunOverview {
  uint32 running_count = 1;
  uint32 recent_count = 2;
  uint32 attention_count = 3;
}
