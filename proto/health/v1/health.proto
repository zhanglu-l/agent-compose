syntax = "proto3";

import "google/protobuf/timestamp.proto";

package health.v1;

option go_package = "agent-compose/proto/health/v1;healthv1";

import "google/protobuf/empty.proto";

service HealthService {
  rpc Status(google.protobuf.Empty) returns (HealthStatusResponse);
  rpc WatchStatus(google.protobuf.Empty) returns (stream HealthStatusResponse);
}

message MemoryUsage {
  uint64 alloc = 1;
  uint64 total_alloc = 2;
  uint64 sys = 3;
  uint32 num_gc = 4;
  uint64 heap_alloc = 5;
  uint64 heap_inuse = 6;
  uint64 heap_sys = 7;
  uint64 heap_idle = 8;
  uint64 stack_inuse = 9;
  uint64 stack_sys = 10;
}

message HealthStatusResponse {
  string version = 1;
  google.protobuf.Timestamp current_time = 2;
  google.protobuf.Timestamp started_at = 3;
  uint64 uptime_seconds = 4;
  string go_version = 5;
  uint64 num_goroutines = 6;
  MemoryUsage memory = 7;
  string build_version = 8;
  ProcessUsage process = 9;
}

message ProcessUsage {
  double cpu_percent = 1;
  uint64 cpu_user_millis = 2;
  uint64 cpu_system_millis = 3;
  uint64 rss_bytes = 4;
  uint64 read_bytes = 5;
  uint64 write_bytes = 6;
  uint64 read_ops = 7;
  uint64 write_ops = 8;
}
