name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref. A new commit makes an older run's
# result irrelevant, so cancel in-progress runs — but only for pull requests.
# Pushes to main are never cancelled (cancel-in-progress is false there) so
# every merged commit still gets tested.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@v3.40.1
      - name: Run lint
        run: task lint

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./cmd/... ./pkg/...

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: runtime/javascript/package-lock.json
      - name: Install runtime test dependencies
        working-directory: runtime/javascript
        run: npm ci
      - name: Run coverage thresholds
        run: ./scripts/test-coverage.sh

  runtime-sdk:
    name: Runtime SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime/agent-compose-runtime-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: runtime/agent-compose-runtime-sdk/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:packaging

  scheduler-runtime:
    name: Scheduler runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: runtime/javascript/package-lock.json
      - run: npm ci
      - run: npm run test:unit
