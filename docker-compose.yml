services:
  agent-compose:
    image: ${AGENT_COMPOSE_IMAGE:-ghcr.io/chaitin/agent-compose:latest}
    container_name: agent-compose
    restart: always
    environment:
      AGENT_COMPOSE_RUNTIME_BASE_URL: ${AGENT_COMPOSE_RUNTIME_BASE_URL:-http://agent-compose:7410}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - ./.env:/data/work/.env:ro
    working_dir: /data/work
    ports:
      - 127.0.0.1:7410:7410

  agent-compose-frontend:
    image: ${AGENT_COMPOSE_FRONTEND_IMAGE:-ghcr.io/chaitin/agent-compose-ui:latest}
    container_name: agent-compose-frontend
    profiles:
      - with-ui
    restart: always
    depends_on:
      - agent-compose
    env_file:
      - ./.env
    environment:
      JUPYTER_PROXY_BASE: ${JUPYTER_PROXY_BASE:-/jupyter}
      NGINX_JUPYTER_PROXY_BASE: ${JUPYTER_PROXY_BASE:-/jupyter}
    ports:
      - "${AGENT_COMPOSE_HTTP_PORT:-80}:8000/tcp"
